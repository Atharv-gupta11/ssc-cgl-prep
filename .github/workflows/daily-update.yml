name: Daily PIB + Vocabulary Update

# Runs every day at 01:45 UTC (07:15 IST), and can be triggered manually.
on:
  schedule:
    - cron: "45 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate today's Current Affairs + Vocabulary (live PIB)
        env:
          FETCH_LIVE: "1"
          BACKFILL_DAYS: "1"   # only add the new day; history is already committed
        run: node scripts/daily-update.mjs

      - name: Commit new daily content
        run: |
          git config user.name "ssc-prep-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/daily data/daily-index.json public/pdf
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily CA + vocab $(date -u +%F)"
            git push
          fi
    # Pushing to main triggers the deploy workflow below (Vercel/Netlify auto-deploy on push).
